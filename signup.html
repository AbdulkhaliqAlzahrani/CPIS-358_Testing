<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Sign Up-Crystal Car Care</title>
    </head>

    <body id="top">
        <header>
            <nav>
                <a href="/home.html">Home</a>
                <a href="/login.html">Login</a>
                <a href="/aboutUs.html">About Us</a>
            </nav>
        </header>
        
        <main style="padding: 20px; text-align: center;">
            <section>
                <h1>Create an Account</h1>
                <p>Join Crystal Car Care today for faster booking and exclusive offers.</p>

                <form action="" method="post" style="max-width: 300px;margin: 0 auto; text-align: left;">
                    <div style="margin-bottom: 15px;">
                        <label for="fullname"><strong>Full Name:</strong></label><br>
                        <input type="text" id="fullname" name="fullname" required style="width: 100%; padding: 8px;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label for="email"><strong>Email Address:</strong></label><br>
                        <input type="email" id="email" name="email" required style="width: 100%; padding: 8px;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label for="password"><strong>Password:</strong></label><br>
                        <input type="password" id="password" name="password" required style="width: 100%; padding: 8px;">
                    </div>

                    <button type="submit" style="padding: 10px 20px; background-color: #003366; color: white; border: none; cursor: pointer; width: 100%;">Sign Up</button>
                </form>

                <p style="margin-top: 20px;">Already have an account? <a href="login.html">Log in here</a></p>            </section>
        </main>

        <footer style="background-color: rgb(205, 251, 255); color: black; text-align: center; padding: 20px; margin-top: 40px;">
            <p>&copy; 2026 Crystal Car Care - All rights reserved.</p>
            <p><a href="#top" style="color: blueviolet; text-decoration: none;">Back To Top &uarr;</a></p>
        </footer>
    </body>
</html>
